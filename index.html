<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Для тебя | Сердце из кода и наша музыка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a0b1f 0%, #2a112f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, 'Montserrat', sans-serif;
            padding: 16px;
        }

        .love-card {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 248, 245, 0.1);
            backdrop-filter: blur(2px);
            border-radius: 64px 48px 64px 48px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 200, 220, 0.2);
            overflow: hidden;
            transition: 0.3s;
            padding: 20px 20px 30px;
            text-align: center;
        }

        .greeting {
            color: #ffd9e6;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 20px;
            font-size: 1rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .greeting span {
            display: inline-block;
            background: #ff3366a0;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
        }

        .start-btn {
            background: linear-gradient(135deg, #ff3366, #ff6b4a);
            border: none;
            padding: 14px 28px;
            font-size: 1.6rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px 0 20px;
            font-family: inherit;
            width: 80%;
            letter-spacing: 1px;
        }

        .start-btn:active {
            transform: scale(0.96);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        .heart-content {
            display: none;
            animation: fadeRise 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        .heart-content.active {
            display: block;
        }

        @keyframes fadeRise {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .canvas-container {
            background: #0f0713;
            border-radius: 48px;
            padding: 12px;
            margin-bottom: 20px;
            box-shadow: 0 20px 30px -10px black;
            border: 1px solid #ff99bb66;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #0b0710;
            border-radius: 36px;
            margin: 0 auto;
            box-shadow: 0 0 0 2px #ff4477, 0 0 0 5px #2a1a2f;
        }

        .code-caption {
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 12px;
            background: #1e1124;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 50px;
            color: #ff98b9;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        .photo-frame {
            margin: 20px 0 20px;
            border-radius: 48px;
            background: linear-gradient(135deg, #ff99bb, #ff4d6d);
            padding: 5px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
        }

        .photo-frame img {
            width: 100%;
            max-height: 320px;
            object-fit: cover;
            border-radius: 44px;
            display: block;
            background: #2a1c2e;
        }

        .music-player {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 56px;
            padding: 10px 20px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid #ff8caa;
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff0f5;
            font-weight: 500;
        }

        .track-name {
            font-size: 0.9rem;
            font-weight: 600;
            background: #ff4d6d30;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .play-pause {
            background: #ff4477;
            border: none;
            color: white;
            font-size: 1.4rem;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .play-pause:active {
            transform: scale(0.94);
        }

        .tiny-note {
            margin-top: 18px;
            font-size: 11px;
            color: #ffb7ce;
            opacity: 0.8;
        }

        button {
            background: none;
            border: none;
        }
        
        .photo-placeholder {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #ff99bb, #ff4d6d);
            border-radius: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            text-align: center;
            padding: 20px;
            flex-direction: column;
            gap: 10px;
        }
        
        .photo-placeholder span {
            font-size: 48px;
        }
    </style>
</head>
<body>

<div class="love-card">
    <div class="greeting">
        <span>✨ для самой красивой ✨</span>
    </div>

    <button class="start-btn" id="startButton">💖 НАЧАЛО 💖</button>

    <div id="magicContent" class="heart-content">
        <div class="canvas-container">
            <canvas id="heartCanvas" width="500" height="500" style="width:100%; height:auto; max-width:500px; aspect-ratio:1/1"></canvas>
            <div class="code-caption">
                🐍 ❤️ Люблю тебя моя самая любимая девочка ❤️
            </div>
        </div>

        <div class="photo-frame" id="ourPhotoFrame">
            <div id="photoContainer"></div>
        </div>

        <div class="music-player">
            <div class="track-info">
                <span>🎧</span>
                <div class="track-name">Miyagi & Эндшпиль — Не грусти</div>
            </div>
            <button class="play-pause" id="playPauseBtn">▶️ Слушать</button>
        </div>
        <div class="tiny-note">
            🌙 для тебя, с любовью и кодом...
        </div>
    </div>
</div>

<script>
    (function() {
        // ========== ТВОИ ФАЙЛЫ (ВНЕДРЕНО!) ==========
        // Фотография: photo_2026-04-27_21-22-14.jpg
        const YOUR_PHOTO_URL = "photo_2026-04-27_21-22-14.jpg";
        
        // Песня: JEndshpilMiyaGi_-_Ne_grusti_76919879.mp3
        const YOUR_MP3_URL = "JEndshpilMiyaGi_-_Ne_grusti_76919879.mp3";
        // ===========================================
        
        // Рисование сердца
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        
        function setCanvasSize() {
            const container = canvas.parentElement;
            const maxWidth = Math.min(500, container.clientWidth);
            canvas.width = 500;
            canvas.height = 500;
            canvas.style.width = `${maxWidth}px`;
            canvas.style.height = 'auto';
            drawHeart();
        }
        
        function drawHeart() {
            if (!ctx) return;
            const w = canvas.width, h = canvas.height;
            ctx.clearRect(0, 0, w, h);
            
            const grad = ctx.createLinearGradient(0, 0, w, h);
            grad.addColorStop(0, '#130b18');
            grad.addColorStop(1, '#1e1226');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
            
            ctx.font = "bold 12px 'Fira Code', 'Courier New', monospace";
            ctx.fillStyle = "#ff448866";
            ctx.shadowBlur = 0;
            const codeLines = [
                "import love as lv",
                "def heart(u):",
                "    return u💖me",
                "while True:",
                "    print('ты + я')",
                "# for you 🌹"
            ];
            for (let i = 0; i < codeLines.length; i++) {
                ctx.fillText(codeLines[i], 20 + (i%2)*15, 40 + i*28);
            }
            ctx.fillStyle = "#c084fc70";
            ctx.fillText("❤️❤️❤️ python ❤️❤️❤️", w-180, h-25);
            
            const t = performance.now() * 0.003;
            const scale = 0.9 + Math.sin(t) * 0.03;
            
            function heartX(teta) {
                const xRaw = 16 * Math.pow(Math.sin(teta), 3);
                const yRaw = 13 * Math.cos(teta) - 5 * Math.cos(2*teta) - 2*Math.cos(3*teta) - Math.cos(4*teta);
                return {x: xRaw, y: yRaw};
            }
            
            const centerX = w/2;
            const centerY = h/2 - 5;
            const baseSize = Math.min(w,h)/3.2;
            const currentSize = baseSize * scale;
            
            ctx.beginPath();
            let first = true;
            for (let ang = 0; ang <= Math.PI * 2; ang += 0.05) {
                const point = heartX(ang);
                const px = centerX + point.x * currentSize / 16;
                const py = centerY - point.y * currentSize / 13;
                if (first) {
                    ctx.moveTo(px, py);
                    first = false;
                } else {
                    ctx.lineTo(px, py);
                }
            }
            ctx.closePath();
            
            const gradHeart = ctx.createLinearGradient(centerX - 40, centerY - 40, centerX + 40, centerY + 40);
            gradHeart.addColorStop(0, '#ff3366');
            gradHeart.addColorStop(0.6, '#ff6b8b');
            gradHeart.addColorStop(1, '#ff99bb');
            ctx.fillStyle = gradHeart;
            ctx.fill();
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff3366";
            ctx.strokeStyle = '#fff0f5';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            ctx.beginPath();
            ctx.arc(centerX - 25, centerY - 15, 7, 0, 2*Math.PI);
            ctx.fillStyle = '#ffffccaa';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX + 30, centerY - 12, 5, 0, 2*Math.PI);
            ctx.fill();
            
            ctx.font = "bold 24px 'Segoe UI', 'Montserrat'";
            ctx.fillStyle = "#fff5e6";
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#ff0066";
            ctx.fillText("❤️", centerX - 20, centerY + 45);
            ctx.font = "bold 18px monospace";
            ctx.fillStyle = "#ffe0f0";
            ctx.fillText("#python_heart", centerX - 55, centerY + 95);
            ctx.shadowBlur = 0;
            
            for (let p = 0; p < 22; p++) {
                const angle = Date.now() * 0.005 + p;
                const rad = 28 + Math.sin(angle) * 5;
                const xP = centerX + Math.cos(angle + p) * rad;
                const yP = centerY + Math.sin(angle*1.3 + p) * rad - 10;
                ctx.beginPath();
                ctx.arc(xP, yP, 2+Math.sin(angle)*1.2, 0, 2*Math.PI);
                ctx.fillStyle = `rgba(255, 100, 150, ${0.5+Math.sin(angle)*0.3})`;
                ctx.fill();
            }
        }
        
        let animFrame;
        function animateHeart() {
            drawHeart();
            animFrame = requestAnimationFrame(animateHeart);
        }
        
        // Загрузка фотографии
        function loadPhoto(url) {
            const container = document.getElementById('photoContainer');
            container.innerHTML = '';
            
            const img = new Image();
            img.style.width = '100%';
            img.style.borderRadius = '44px';
            img.style.display = 'block';
            img.style.cursor = 'pointer';
            
            img.onload = function() {
                container.innerHTML = '';
                container.appendChild(img);
                img.addEventListener('click', () => window.open(url, '_blank'));
                console.log("✅ Фото загружено!");
            };
            
            img.onerror = function() {
                container.innerHTML = `
                    <div class="photo-placeholder">
                        <span>📸</span>
                        <p>Фото не найдено!</p>
                        <p style="font-size: 12px;">Файл "${url}" должен лежать в той же папке</p>
                    </div>
                `;
                console.error("❌ Фото не загружено:", url);
            };
            
            img.src = url;
        }
        
        // МУЗЫКА
        let audio = new Audio();
        let isPlaying = false;
        
        function initMusic(musicUrl) {
            audio.src = musicUrl;
            audio.preload = "auto";
            audio.loop = true;
            audio.load();
            console.log("🎵 Загружаем музыку:", musicUrl);
        }
        
        function startMusic() {
            if (!audio.src || audio.src === window.location.href) {
                console.error("Нет ссылки на музыку!");
                return;
            }
            
            audio.play().then(() => {
                isPlaying = true;
                playBtn.innerHTML = "⏸️ Пауза";
                console.log("🎶 Музыка играет!");
            }).catch(e => {
                console.error("Ошибка воспроизведения:", e);
                alert("Не удалось загрузить песню.\n\nПроверь, что файл лежит в той же папке:\n" + YOUR_MP3_URL);
            });
        }
        
        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                playBtn.innerHTML = "▶️ Слушать";
                isPlaying = false;
            } else {
                audio.play().catch(e => {
                    alert("Не удалось включить музыку");
                });
                playBtn.innerHTML = "⏸️ Пауза";
                isPlaying = true;
            }
        }
        
        // Инициализируем музыку с ТВОИМ файлом
        initMusic(YOUR_MP3_URL);
        
        const playBtn = document.getElementById('playPauseBtn');
        playBtn.addEventListener('click', togglePlay);
        
        audio.addEventListener('ended', () => {
            audio.currentTime = 0;
            audio.play();
        });
        audio.addEventListener('play', () => {
            isPlaying = true;
            playBtn.innerHTML = "⏸️ Пауза";
        });
        audio.addEventListener('pause', () => {
            isPlaying = false;
            playBtn.innerHTML = "▶️ Слушать";
        });
        audio.addEventListener('error', (e) => {
            console.error("Ошибка аудио:", e);
            alert("Ошибка загрузки MP3!\n\nФайл должен лежать в папке:\n" + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/')) + "\\" + YOUR_MP3_URL);
        });
        
        const startBtn = document.getElementById('startButton');
        const contentBlock = document.getElementById('magicContent');
        
        startBtn.addEventListener('click', () => {
            if (!contentBlock.classList.contains('active')) {
                contentBlock.classList.add('active');
                if (!animFrame) animateHeart();
                startBtn.style.opacity = '0.7';
                startBtn.disabled = true;
                startBtn.innerText = '✨ Уже сияет ✨';
                
                // Загружаем фото
                loadPhoto(YOUR_PHOTO_URL);
                
                // Включаем музыку
                startMusic();
            }
        });
        
        window.addEventListener('resize', () => {
            if (canvas) setCanvasSize();
        });
        setCanvasSize();
        drawHeart();
        
        console.log("✅ Страница загружена!");
        console.log("📁 Ищем фото:", YOUR_PHOTO_URL);
        console.log("🎵 Ищем песню:", YOUR_MP3_URL);
        console.log("💡 Файлы должны лежать в одной папке с index.html");
    })();
</script>
</body>
</html>
